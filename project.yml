name: AtlasMe
options:
  bundleIdPrefix: com.atlasme
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

targets:
  AtlasMe:
    type: application
    platform: iOS
    sources:
      - path: AtlasMe
    info:
      path: AtlasMe/Info.plist
      properties:
        CFBundleDisplayName: AtlasMe
        CFBundleIdentifier: com.atlasme.ios
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
    settings:
      base:
        INFOPLIST_FILE: AtlasMe/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.atlasme.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
